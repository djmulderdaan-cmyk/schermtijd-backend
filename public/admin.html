<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schermtijd Test — Adminbeheer</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --bg: #121417;
    --panel: #1E2126;
    --panel2: #262a31;
    --border: #333944;
    --text: #F2F2F2;
    --text-dim: #9AA1AC;
    --yellow: #F5C518;
    --blue: #2E86FF;
    --red: #FF6B6B;
    --green: #4CAF50;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header .brand { font-weight: 700; font-size: 18px; }
  header .brand span { color: var(--yellow); }
  header .brand small { color: var(--text-dim); font-weight: 400; font-size: 12px; margin-left: 8px; }
  main { max-width: 1000px; margin: 0 auto; padding: 24px 16px 60px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 18px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  h2 { font-size: 16px; margin: 0 0 14px; color: var(--yellow); }
  p.hint { color: var(--text-dim); font-size: 13px; margin: 0 0 18px; }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel2);
    color: var(--text);
    font-size: 15px;
    margin-bottom: 12px;
  }
  input:focus { outline: none; border-color: var(--blue); }
  button {
    border: none;
    border-radius: 10px;
    padding: 11px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: var(--yellow); color: #121417; }
  .btn-secondary { background: var(--panel2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn-small { padding: 6px 12px; font-size: 12px; }
  button:disabled { opacity: 0.5; cursor: default; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
  .stat { background: var(--panel2); border-radius: 10px; padding: 14px; text-align: center; }
  .stat .num { font-size: 26px; font-weight: 700; color: var(--yellow); }
  .stat .label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); }
  th { color: var(--text-dim); font-weight: 500; font-size: 12px; text-transform: uppercase; }
  tr.account-row { cursor: pointer; }
  tr.account-row:hover { background: var(--panel2); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; background: var(--panel2); color: var(--text-dim); margin-right: 4px; }
  .badge.locked { background: rgba(255,107,107,0.15); color: var(--red); }
  .badge.unlocked { background: rgba(76,175,80,0.15); color: var(--green); }
  #detailPanel { display: none; }
  .child-block { background: var(--panel2); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .child-block h3 { margin: 0 0 8px; font-size: 15px; }
  .device-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-top: 1px solid var(--border); font-size: 13px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .msg { padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 14px; }
  .msg.error { background: rgba(255,107,107,0.15); color: var(--red); }
  .msg.ok { background: rgba(76,175,80,0.15); color: var(--green); }
  .back-link { color: var(--blue); cursor: pointer; font-size: 13px; margin-bottom: 14px; display: inline-block; }
  @media (max-width: 560px) {
    table, thead, tbody, th, td, tr { display: block; }
    thead { display: none; }
    tr.account-row { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; padding: 8px; }
    td { border: none; padding: 4px 0; }
    td::before { content: attr(data-label); color: var(--text-dim); font-size: 11px; display: block; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">Rubenpoo <span>Test</span><small>alleen voor beheer</small></div>
  <button class="btn-secondary btn-small" id="logoutBtn" style="display:none" onclick="logout()">Uitloggen</button>
</header>

<main>

  <div class="card" id="loginCard">
    <h1>Adminbeheer</h1>
    <p class="hint">Deze pagina is niet bedoeld voor gewone gebruikers — alleen voor jouzelf om alle accounts te beheren.</p>
    <div id="loginMsg"></div>
    <input type="password" id="adminPassword" placeholder="Adminwachtwoord" onkeydown="if(event.key==='Enter') doLogin()">
    <button class="btn-primary" onclick="doLogin()" style="width:100%">Inloggen</button>
  </div>

  <div id="dashboard" style="display:none">

    <div class="card">
      <h2>Overzicht</h2>
      <div class="stats-grid" id="statsGrid"></div>
    </div>

    <div class="card" id="listCard">
      <h2>Alle accounts</h2>
      <div id="listMsg"></div>
      <table>
        <thead><tr><th>E-mail</th><th>Sinds</th><th>Kinderen</th><th>Apparaten</th></tr></thead>
        <tbody id="accountsBody"></tbody>
      </table>
    </div>

    <div class="card" id="detailPanel">
      <span class="back-link" onclick="closeDetail()">&larr; Terug naar overzicht</span>
      <h2 id="detailEmail"></h2>
      <div id="detailMsg"></div>
      <div id="childrenList"></div>
      <div class="row" style="margin-top:18px; border-top:1px solid var(--border); padding-top:16px;">
        <button class="btn-secondary btn-small" onclick="promptResetPassword()">Wachtwoord resetten</button>
        <button class="btn-danger btn-small" onclick="confirmDeleteAccount()">Account verwijderen</button>
      </div>
    </div>

  </div>

</main>

<script>
  const apiUrl = window.location.origin + '/api/admin';
  let adminToken = localStorage.getItem('adminToken') || null;
  let currentAccountId = null;

  async function api(path, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    if (adminToken) headers['Authorization'] = 'Bearer ' + adminToken;
    const resp = await fetch(apiUrl + path, { ...options, headers });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(data.error || 'Er ging iets mis');
    return data;
  }

  function showMsg(elId, text, isError) {
    const el = document.getElementById(elId);
    el.innerHTML = `<div class="msg ${isError ? 'error' : 'ok'}">${text}</div>`;
    setTimeout(() => { el.innerHTML = ''; }, 4000);
  }

  async function doLogin() {
    const password = document.getElementById('adminPassword').value;
    if (!password) return;
    try {
      const data = await api('/login', { method: 'POST', body: JSON.stringify({ password }) });
      adminToken = data.token;
      localStorage.setItem('adminToken', adminToken);
      enterDashboard();
    } catch (e) {
      showMsg('loginMsg', e.message, true);
    }
  }

  function logout() {
    adminToken = null;
    localStorage.removeItem('adminToken');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginCard').style.display = 'block';
    document.getElementById('logoutBtn').style.display = 'none';
  }

  async function enterDashboard() {
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('logoutBtn').style.display = 'inline-block';
    await loadStats();
    await loadAccounts();
  }

  async function loadStats() {
    try {
      const s = await api('/stats');
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat"><div class="num">${s.totalAccounts}</div><div class="label">Accounts</div></div>
        <div class="stat"><div class="num">${s.totalChildren}</div><div class="label">Kinderen</div></div>
        <div class="stat"><div class="num">${s.totalDevices}</div><div class="label">Apparaten</div></div>
        <div class="stat"><div class="num">${s.activeDevices24h}</div><div class="label">Actief (24u)</div></div>
      `;
    } catch (e) {
      if (e.message.includes('Ongeldig') || e.message.includes('adminrechten')) return logout();
    }
  }

  async function loadAccounts() {
    try {
      const accounts = await api('/accounts');
      const tbody = document.getElementById('accountsBody');
      if (accounts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4">Nog geen accounts.</td></tr>';
        return;
      }
      tbody.innerHTML = accounts.map((a) => `
        <tr class="account-row" onclick="openDetail(${a.id})">
          <td data-label="E-mail">${a.email}</td>
          <td data-label="Sinds">${new Date(a.createdAt).toLocaleDateString('nl-NL')}</td>
          <td data-label="Kinderen">${a.childCount}</td>
          <td data-label="Apparaten">${a.deviceCount}</td>
        </tr>
      `).join('');
    } catch (e) {
      showMsg('listMsg', e.message, true);
    }
  }

  async function openDetail(id) {
    currentAccountId = id;
    try {
      const account = await api('/accounts/' + id);
      document.getElementById('listCard').style.display = 'none';
      document.getElementById('detailPanel').style.display = 'block';
      document.getElementById('detailEmail').textContent = account.email;

      const childrenHtml = account.children.length === 0
        ? '<p class="hint">Geen kinderen op dit account.</p>'
        : account.children.map((c) => {
            const childLocked = c.rule && c.rule.lockedDate === new Date().toISOString().slice(0, 10);
            const devicesHtml = c.devices.map((d) => {
              const devLocked = childLocked || d.lockedDate === new Date().toISOString().slice(0, 10);
              return `
                <div class="device-row">
                  <span>${d.name} <span class="badge">${d.platform}</span> ${devLocked ? '<span class="badge locked">vergrendeld</span>' : '<span class="badge unlocked">actief</span>'}</span>
                  <button class="btn-secondary btn-small" onclick="toggleDeviceLock(${d.id}, ${!devLocked})">${devLocked ? 'Ontgrendel' : 'Vergrendel'}</button>
                </div>
              `;
            }).join('') || '<p class="hint">Geen apparaten gekoppeld.</p>';
            return `
              <div class="child-block">
                <h3>${c.name} ${childLocked ? '<span class="badge locked">alles vergrendeld</span>' : ''}</h3>
                <p class="hint" style="margin:0 0 8px">Limiet: ${c.rule ? c.rule.dailyLimitMinutes : 60} min/dag</p>
                ${devicesHtml}
                <div class="row">
                  <button class="btn-secondary btn-small" onclick="toggleChildLock(${c.id}, ${!childLocked})">${childLocked ? 'Alles ontgrendelen' : 'Alles vergrendelen'}</button>
                </div>
              </div>
            `;
          }).join('');

      document.getElementById('childrenList').innerHTML = childrenHtml;
    } catch (e) {
      showMsg('listMsg', e.message, true);
    }
  }

  function closeDetail() {
    document.getElementById('detailPanel').style.display = 'none';
    document.getElementById('listCard').style.display = 'block';
    loadAccounts();
    loadStats();
  }

  async function toggleChildLock(childId, locked) {
    try {
      await api(`/children/${childId}/lock`, { method: 'PUT', body: JSON.stringify({ locked }) });
      openDetail(currentAccountId);
    } catch (e) {
      showMsg('detailMsg', e.message, true);
    }
  }

  async function toggleDeviceLock(deviceId, locked) {
    try {
      await api(`/devices/${deviceId}/lock`, { method: 'PUT', body: JSON.stringify({ locked }) });
      openDetail(currentAccountId);
    } catch (e) {
      showMsg('detailMsg', e.message, true);
    }
  }

  async function promptResetPassword() {
    const newPassword = prompt('Nieuw wachtwoord voor dit account (minstens 8 tekens):');
    if (!newPassword) return;
    try {
      await api(`/accounts/${currentAccountId}/password`, { method: 'PUT', body: JSON.stringify({ newPassword }) });
      showMsg('detailMsg', 'Wachtwoord aangepast.', false);
    } catch (e) {
      showMsg('detailMsg', e.message, true);
    }
  }

  async function confirmDeleteAccount() {
    const email = document.getElementById('detailEmail').textContent;
    if (!confirm(`Weet je zeker dat je "${email}" volledig wilt verwijderen? Dit verwijdert ook alle kinderen, apparaten en gegevens, en kan niet ongedaan gemaakt worden.`)) return;
    try {
      await api(`/accounts/${currentAccountId}`, { method: 'DELETE' });
      closeDetail();
    } catch (e) {
      showMsg('detailMsg', e.message, true);
    }
  }

  if (adminToken) enterDashboard();
</script>

</body>
</html>
